name: Bootstrap (run this once)

# Run this ONCE, by hand, from the Actions tab.
# It downloads the game history and commits it, so you never need to
# install Python or open a terminal on your own computer.

on:
  workflow_dispatch:
    inputs:
      seasons:
        description: "Seasons to download"
        default: "2022 2023 2024 2025"
        required: true

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Check the model's math
        run: python pickhub.py selftest

      - name: Download game history
        run: python pickhub.py fetch ${{ inputs.seasons }}

      - name: Backtest — this is the output that matters
        run: python pickhub.py backtest | tee backtest-report.txt

      - name: Fit the calibration (fixes overconfidence)
        run: python calibrate.py fit | tee -a backtest-report.txt

      - name: Commit the data and the report
        run: |
          git config user.name  "pickhub-bot"
          git config user.email "bot@users.noreply.github.com"
          # calibration.json only exists if the fit actually improved things.
          # Add whatever is present; don't fail if something isn't.
          git add -A games.csv pitcher_era_cache.json backtest-report.txt calibration.json 2>/dev/null || true
          git add -A
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "bootstrap: game history + backtest report"
            git push
          fi

      - name: Upload the report so you can read it in the browser
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: backtest-report.txt
